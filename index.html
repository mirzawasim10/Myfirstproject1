<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            color: #333;
            text-align: center;
            padding: 50px 20px;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
        }
        h1 {
            margin: 20px 0 10px 0;
            font-size: 24px;
        }
        p {
            font-size: 16px;
            margin-bottom: 30px;
        }
        .link-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 15px auto;
            padding: 15px;
            background: white;
            color: #6c5ce7;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .link-btn:hover {
            transform: scale(1.05);
            background: #6c5ce7;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Put your profile picture URL inside src below -->
    <img class="profile-img" src="https://placeholder.com" alt="My Profile Picture">

    <h1>MIRZA WASIM</h1>
    <p>Welcome to my page! Check out my links below.</p>

    <!-- Change the href URLs to your actual social links -->
    <a class="link-btn" href="https://github.com" target="_blank">My GitHub</a>
    <a class="link-btn" href="https://linkedin.com" target="_blank">My LinkedIn</a>
    <a class="link-btn" href="https://instagram.com" target="_blank">My Instagram</a>

</body>
</html>
